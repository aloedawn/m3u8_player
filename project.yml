name: M3U8Player
options:
  bundleIdPrefix: com.m3u8player
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  M3U8Player:
    type: application
    platform: macOS
    sources:
      - path: Sources/M3U8Player
        excludes:
          - "*.json.example"   # 템플릿 파일은 소스에서 제외
    resources:
      - path: Sources/M3U8Player/Channels.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.m3u8player.M3U8Player
        INFOPLIST_FILE: Sources/M3U8Player/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
